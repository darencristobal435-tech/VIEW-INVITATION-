<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #d4af37 0%, transparent 70%);
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* Sparkle Stars */
        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkleFloat 6s ease-in-out infinite;
        }

        .sparkle::before,
        .sparkle::after {
            content: '';
            position: absolute;
            background: #d4af37;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(212, 175, 55, 0.8);
        }

        .sparkle::before {
            width: 4px;
            height: 4px;
            top: -2px;
            left: -2px;
        }

        .sparkle::after {
            width: 2px;
            height: 2px;
            top: -1px;
            left: -1px;
            background: #fff;
            box-shadow: 0 0 8px 4px rgba(255, 255, 255, 0.6);
        }

        @keyframes sparkleFloat {
            0%, 100% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translateY(-20px) translateX(10px) scale(1.8);
                opacity: 1;
            }
            50% {
                transform: translateY(-10px) translateX(-10px) scale(0.7);
                opacity: 0.5;
            }
            75% {
                transform: translateY(-30px) translateX(5px) scale(1.5);
                opacity: 0.9;
            }
        }

        /* Main Content Wrapper */
        .wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glassmorphism Card */
        .luxury-card {
            background: rgba(20, 20, 40, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 32px;
            padding: 60px 50px 50px;
            text-align: center;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .luxury-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(212, 175, 55, 0.06) 0%, transparent 50%);
            animation: cardGlow 8s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%, 100% {
                transform: rotate(0deg);
            }
            50% {
                transform: rotate(15deg);
            }
        }

        /* Ornamental Lines */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .ornament-line {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }

        .ornament-diamond {
            width: 8px;
            height: 8px;
            background: #d4af37;
            transform: rotate(45deg);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        }

        /* Invitation Text */
        .invitation-label {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 5px;
            color: #d4af37;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
            margin-top: 24px;
            font-weight: 300;
            letter-spacing: 1.5px;
        }

        /* Button with Shimmer */
        .btn-wrapper {
            position: relative;
            display: inline-block;
        }

        .btn-view {
            display: inline-block;
            padding: 18px 50px;
            background: linear-gradient(135deg, #c59b27 0%, #d4af37 30%, #f4d97a 60%, #d4af37 80%, #c59b27 100%);
            background-size: 200% auto;
            color: #0a0a0a;
            text-decoration: none;
            border-radius: 999px;
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 3px;
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 1;
            box-shadow:
                0 0 30px rgba(212, 175, 55, 0.4),
                0 0 60px rgba(212, 175, 55, 0.2),
                0 10px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            animation: shimmer 3s ease-in-out infinite;
            overflow: hidden;
        }

        @keyframes shimmer {
            0%, 100% {
                background-position: 0% center;
            }
            50% {
                background-position: 200% center;
            }
        }

        .btn-view::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 999px;
            background: linear-gradient(135deg, #d4af37, transparent, #d4af37);
            z-index: -1;
            opacity: 0.5;
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
        }

        .btn-view:hover {
            transform: scale(1.1);
            box-shadow:
                0 0 50px rgba(212, 175, 55, 0.7),
                0 0 100px rgba(212, 175, 55, 0.4),
                0 15px 40px rgba(0, 0, 0, 0.5);
            background-position: right center;
            animation: none;
        }

        .btn-view:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }

        /* Click Ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: rippleEffect 0.7s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .luxury-card {
                padding: 40px 25px 35px;
                border-radius: 24px;
                margin: 0 15px;
            }

            .btn-view {
                padding: 15px 35px;
                font-size: 16px;
                letter-spacing: 2px;
            }

            .invitation-label {
                font-size: 11px;
                letter-spacing: 4px;
            }

            .subtitle {
                font-size: 13px;
            }

            .ornament-line {
                width: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- Floating Particles -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Floating Sparkles -->
    <div id="sparklesContainer"></div>

    <!-- Main Content -->
    <div class="wrapper">
        <div class="luxury-card">
            <!-- Ornament -->
            <div class="ornament">
                <div class="ornament-line"></div>
                <div class="ornament-diamond"></div>
                <div class="ornament-line"></div>
            </div>

            <p class="invitation-label">You are cordially invited</p>

            <div class="btn-wrapper" id="btnWrapper">
                <a href="https://karldaryllargoo-a11y.github.io/Eleine18thbirthday/" target="_blank" rel="noopener noreferrer" class="btn-view" id="mainBtn">
                    ✦ View Invitation ✦
                </a>
            </div>

            <p class="subtitle">Tap below to open the official invitation</p>

            <!-- Ornament -->
            <div class="ornament" style="margin-top: 24px; margin-bottom: 0;">
                <div class="ornament-line"></div>
                <div class="ornament-diamond"></div>
                <div class="ornament-line"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Floating Gold Particles ---
        const particlesContainer = document.getElementById('particlesContainer');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 8 + 6 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.opacity = Math.random() * 0.6 + 0.2;

            particlesContainer.appendChild(particle);
        }

        // --- Floating Sparkles ---
        const sparklesContainer = document.getElementById('sparklesContainer');
        const sparkleCount = 15;

        for (let i = 0; i < sparkleCount; i++) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 90 + '%';
            sparkle.style.top = Math.random() * 90 + '%';
            sparkle.style.animationDuration = Math.random() * 6 + 5 + 's';
            sparkle.style.animationDelay = Math.random() * 6 + 's';

            sparklesContainer.appendChild(sparkle);
        }

        // --- Button Ripple Effect ---
        const mainBtn = document.getElementById('mainBtn');
        const btnWrapper = document.getElementById('btnWrapper');

        mainBtn.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');

            const rect = mainBtn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';

            mainBtn.appendChild(ripple);

            ripple.addEventListener('animationend', function() {
                ripple.remove();
            });
        });
    </script>
</body>
</html>
